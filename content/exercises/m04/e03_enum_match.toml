    "In match, destructure the data: `Forma::Circulo(r) => ...`",
    "For PI use: `std::f64::consts::PI`",
    "Triangle: `base * altura / 2.0`",
]

[solution]
code = '''enum Forma {
    Circulo(f64),
    Rectangulo(f64, f64),
    Triangulo(f64, f64),
}

fn calcular_area(forma: &Forma) -> f64 {
    match forma {
        Forma::Circulo(r) => std::f64::consts::PI * r * r,
        Forma::Rectangulo(ancho, alto) => ancho * alto,
        Forma::Triangulo(base, altura) => base * altura / 2.0,
    }
}

fn main() {
    let formas = vec![
        Forma::Circulo(5.0),
        Forma::Rectangulo(10.0, 5.0),
        Forma::Triangulo(8.0, 6.0),
    ];

    for forma in &formas {
        println!("Area: {:.2}", calcular_area(forma));
    }
}'''
