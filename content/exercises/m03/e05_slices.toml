[solution]
code = '''fn extraer_dominio(email: &str) -> &str {
    if let Some(pos) = email.find('@') {
        &email[pos + 1..]
    } else {
        email
    }
}

fn main() {
    let email1 = "ferris@rust-lang.org";
    let email2 = "usuario@gmail.com";

    println!("{} -> {}", email1, extraer_dominio(email1));
    println!("{} -> {}", email2, extraer_dominio(email2));
}'''
