    "To count unique words, you need a structure that doesn't allow duplicates. Convert to lowercase first",
    "Think about which collection you learned that doesn't allow repeated elements",
]

[solution]
code = '''use std::collections::HashMap;

fn analizar_texto(texto: &str) -> (usize, String, usize) {
    let palabras: Vec<&str> = texto.split_whitespace().collect();
    let total = palabras.len();

    let larga = palabras.iter()
        .max_by_key(|w| w.len())
        .unwrap_or(&"")
        .to_string();

    let mut unicas_map: HashMap<String, bool> = HashMap::new();
    for palabra in &palabras {
        unicas_map.entry(palabra.to_lowercase()).or_insert(true);
    }
    let unicas = unicas_map.len();

    (total, larga, unicas)
}

fn main() {
    let texto = "Rust es genial Rust es rapido y Rust es seguro";
    let (total, larga, unicas) = analizar_texto(texto);

    println!("Total palabras: {}", total);
    println!("Mas larga: {}", larga);
    println!("Unicas: {}", unicas);
}'''
