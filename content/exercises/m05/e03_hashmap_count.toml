    "Iterate through each character. Remember characters are obtained with a &str method",
    "You need to ignore certain characters and convert to lowercase before counting",
    "HashMap has a method for handling 'insert if not exists' elegantly: look up 'entry' in the docs",
]

[solution]
code = '''use std::collections::HashMap;

fn contar_caracteres(texto: &str) -> HashMap<char, u32> {
    let mut conteo = HashMap::new();
    for c in texto.chars() {
        if c == ' ' {
            continue;
        }
        for lower in c.to_lowercase() {
            let count = conteo.entry(lower).or_insert(0);
            *count += 1;
        }
    }
    conteo
}

fn main() {
    let conteo = contar_caracteres("Rust Rust");

    let mut pares: Vec<_> = conteo.iter().collect();
    pares.sort_by_key(|(c, _)| *c);

    for (c, n) in pares {
        println!("'{}': {}", c, n);
    }
}'''
