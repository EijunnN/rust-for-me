[meta]
id = "m02_e09"
module = "m02"
difficulty = "intermediate"
order = 9
exercise_type = "fix_bug"

[title]
es = "Corrige el error de ownership"
en = "Fix the ownership error"

[description]
es = """Este codigo intenta usar una variable despues de que su valor fue movido.
El compilador produce el error E0382: 'use of moved value'.
Corrige el codigo para que compile y produzca la salida esperada."""
en = """This code tries to use a variable after its value was moved.
The compiler produces error E0382: 'use of moved value'.
Fix the code so it compiles and produces the expected output."""

[broken_code]
code = '''fn main() {
    let s1 = String::from("hello");
    let s2 = s1;
    println!("s1 = {}, s2 = {}", s1, s2);
}'''

[compiler_error]
es = "error[E0382]: borrow of moved value: `s1` -- El valor de s1 fue movido a s2 y ya no se puede usar."
en = "error[E0382]: borrow of moved value: `s1` -- The value of s1 was moved to s2 and can no longer be used."

[starter_code]
code = '''fn main() {
    let s1 = String::from("hello");
    let s2 = s1;
    println!("s1 = {}, s2 = {}", s1, s2);
}'''

[validation]
expected_output = "s1 = hello, s2 = hello"

[hints]
es = [
    "Lee el error: dice 'borrow of moved value'. Cuando un String se asigna, el ownership se transfiere",
    "Necesitas que s2 tenga su propia copia del dato, no que se lleve la de s1",
    "Hay un metodo que crea una copia completa e independiente de un String",
]
en = [
    "Read the error: it says 'borrow of moved value'. When a String is assigned, ownership transfers",
    "You need s2 to have its own copy of the data, not to take s1's",
    "There's a method that creates a complete, independent copy of a String",
]

[solution]
code = '''fn main() {
    let s1 = String::from("hello");
    let s2 = s1.clone();
    println!("s1 = {}, s2 = {}", s1, s2);
}'''
