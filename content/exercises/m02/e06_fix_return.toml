[meta]
id = "m02_e06"
module = "m02"
difficulty = "beginner"
order = 6
exercise_type = "fix_bug"

[title]
es = "Corrige el retorno de la funcion"
en = "Fix the function return"

[description]
es = """El siguiente codigo tiene errores en los valores de retorno de las funciones.
Hay puntos y comas que no deberian estar, y falta alguna expresion de retorno.
Corrige SOLO los errores de retorno (no cambies la logica ni los nombres).

Pista: busca puntos y comas despues de la ultima expresion."""
en = """The following code has errors in the function return values.
There are semicolons that shouldn't be there, and some return expressions are missing.
Fix ONLY the return errors (don't change the logic or names).

Hint: look for semicolons after the last expression."""

[broken_code]
code = '''fn doble(x: i32) -> i32 {
    x * 2;
}

fn es_par(x: i32) -> bool {
    x % 2 == 0;
}

fn celsius_a_fahrenheit(celsius: f64) -> f64 {
    celsius * 9.0 / 5.0 + 32.0;
}

fn main() {
    println!("Doble de 5: {}", doble(5));
    println!("7 es par: {}", es_par(7));
    println!("100C = {}F", celsius_a_fahrenheit(100.0));
}'''

[compiler_error]
es = "error[E0308]: mismatched types. expected `i32`, found `()` -- Las funciones devuelven () cuando la ultima expresion tiene punto y coma."
en = "error[E0308]: mismatched types. expected `i32`, found `()` -- Functions return () when the last expression has a semicolon."

[starter_code]
code = '''fn doble(x: i32) -> i32 {
    x * 2;
}

fn es_par(x: i32) -> bool {
    x % 2 == 0;
}

fn celsius_a_fahrenheit(celsius: f64) -> f64 {
    celsius * 9.0 / 5.0 + 32.0;
}

fn main() {
    println!("Doble de 5: {}", doble(5));
    println!("7 es par: {}", es_par(7));
    println!("100C = {}F", celsius_a_fahrenheit(100.0));
}'''

[validation]
expected_output = """Doble de 5: 10
7 es par: false
100C = 212F"""

[hints]
es = [
    "Lee el error: dice que espera un tipo pero recibe '()' (unidad, es decir, nada)",
    "En Rust, la ultima expresion de una funcion es su valor de retorno... a menos que tenga algo extra",
    "Piensa: que pasa cuando le pones punto y coma a una expresion? Se convierte en una sentencia que no devuelve nada",
    "El bug es el mismo en las tres funciones, busca el patron comun",
]
en = [
    "Read the error: it expects a type but receives '()' (unit, meaning nothing)",
    "In Rust, the last expression in a function is its return value... unless it has something extra",
    "Think: what happens when you put a semicolon on an expression? It becomes a statement that returns nothing",
    "The bug is the same in all three functions, look for the common pattern",
]

[solution]
code = '''fn doble(x: i32) -> i32 {
    x * 2
}

fn es_par(x: i32) -> bool {
    x % 2 == 0
}

fn celsius_a_fahrenheit(celsius: f64) -> f64 {
    celsius * 9.0 / 5.0 + 32.0
}

fn main() {
    println!("Doble de 5: {}", doble(5));
    println!("7 es par: {}", es_par(7));
    println!("100C = {}F", celsius_a_fahrenheit(100.0));
}'''
