[[blocks]]
type = "code"
language = "rust"
runnable = false
code = '''use std::io;

fn calcular(num1: f64, operador: &str, num2: f64) -> Result<f64, String> {
    match operador {
        "+" => Ok(num1 + num2),
        "-" => Ok(num1 - num2),
        "*" => Ok(num1 * num2),
        "/" => {
            if num2 == 0.0 {
                Err(String::from("Error: No se puede dividir por cero"))
            } else {
                Ok(num1 / num2)
            }
        }
        _ => Err(format!("Error: Operador '{}' no válido. Usa +, -, * o /", operador)),
    }
}

fn leer_numero(mensaje: &str) -> f64 {
    println!("{}", mensaje);
    let mut input = String::new();
    io::stdin()
        .read_line(&mut input)
        .expect("Error al leer la entrada");
    input
        .trim()
        .parse()
        .expect("Por favor ingresa un número válido")
}

fn leer_operador() -> String {
    println!("Ingresa el operador (+, -, *, /):");
    let mut input = String::new();
    io::stdin()
        .read_line(&mut input)
        .expect("Error al leer la entrada");
    input.trim().to_string()
}

fn main() {
    println!("╔═══════════════════════════╗");
    println!("║   🦀 Calculadora Rust 🦀  ║");
    println!("╚═══════════════════════════╝");
    println!();

    let num1 = leer_numero("Ingresa el primer número:");
    let operador = leer_operador();
    let num2 = leer_numero("Ingresa el segundo número:");

    match calcular(num1, &operador, num2) {
        Ok(resultado) => {
            println!();
            println!("✅ {} {} {} = {}", num1, operador, num2, resultado);
        }
        Err(error) => {
            println!();
            println!("❌ {}", error);
        }
    }
}'''

