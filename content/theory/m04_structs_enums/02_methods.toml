type = "quiz"
es = "Cual es la diferencia entre una funcion asociada y un metodo en un bloque `impl`?"
en = "What is the difference between an associated function and a method in an `impl` block?"
[[blocks.options]]
es = "No hay diferencia"
en = "There's no difference"
correct = false
[[blocks.options]]
es = "Los metodos reciben `self` (o &self, &mut self) como primer parametro; las funciones asociadas no"
en = "Methods receive `self` (or &self, &mut self) as first parameter; associated functions don't"
correct = true
[[blocks.options]]
es = "Las funciones asociadas son privadas"
en = "Associated functions are private"
correct = false
[[blocks.options]]
es = "Los metodos son mas rapidos"
en = "Methods are faster"
correct = false

