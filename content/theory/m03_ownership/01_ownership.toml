[title]
es = "Ownership: que es y por que importa"
en = "Ownership: what it is and why it matters"

[[blocks]]
type = "text"
es = """## El Problema: quien libera la memoria?

Cuando tu programa crea datos (un texto, una lista, una imagen), esos datos ocupan **memoria** del computador. La pregunta clave es: **quien es responsable de liberar esa memoria cuando ya no se necesita?**

En lenguajes como Python o JavaScript, un programa interno llamado **garbage collector** (recolector de basura) se encarga automaticamente. Funciona, pero tiene un costo: tu programa hace pausas impredecibles mientras el garbage collector busca memoria sin usar, y usa mas memoria de la necesaria.

En C y C++, el programador libera la memoria manualmente. Esto es rapido, pero extremadamente peligroso:"""
en = """## The Problem: who frees the memory?

When your program creates data (a text, a list, an image), that data occupies computer **memory**. The key question is: **who is responsible for freeing that memory when it's no longer needed?**

In languages like Python or JavaScript, an internal program called a **garbage collector** handles this automatically. It works, but has a cost: your program makes unpredictable pauses while the garbage collector searches for unused memory, and uses more memory than necessary.

In C and C++, the programmer frees memory manually. This is fast, but extremely dangerous:"""

[[blocks]]
type = "code"
language = "c"
runnable = false
code = '''// C - manual memory management (simplified)
char* name = malloc(100);   // Reserve 100 bytes of memory
strcpy(name, "Ferris");
free(name);                 // Free the memory
printf("%s", name);         // BUG! Using memory after freeing it
free(name);                 // BUG! Freeing the same memory twice - crash!'''

[[blocks]]
type = "text"
es = """Olvidar liberar memoria causa **memory leaks** (fugas de memoria: tu programa consume cada vez mas RAM). Liberar memoria dos veces causa **crashes**. Usar memoria ya liberada causa **vulnerabilidades de seguridad criticas**.

## La solucion de Rust: Ownership

Rust resuelve este problema de una forma unica: el **sistema de ownership** (propiedad). No necesita garbage collector ni gestion manual. El compilador sabe *exactamente* cuando liberar la memoria, y lo hace automaticamente. Sin pausas, sin errores, sin costo extra en tiempo de ejecucion."""
en = """Forgetting to free memory causes **memory leaks** (your program consumes more and more RAM). Freeing memory twice causes **crashes**. Using already-freed memory causes **critical security vulnerabilities**.

## Rust's solution: Ownership

Rust solves this problem in a unique way: the **ownership system**. It needs no garbage collector or manual management. The compiler knows *exactly* when to free memory, and does it automatically. No pauses, no errors, no extra runtime cost."""

[[blocks]]
type = "callout"
variant = "info"
es = """**Las tres reglas del ownership:**
1. Cada valor en Rust tiene una variable que es su **owner** (propietario). Piensa en ello como: cada objeto tiene exactamente un dueno.
2. Solo puede haber **un owner** a la vez. No pueden existir dos duenos del mismo valor.
3. Cuando el owner sale del **scope** (alcance), el valor se **libera automaticamente**."""
en = """**The three rules of ownership:**
1. Each value in Rust has a variable that is its **owner**. Think of it as: each object has exactly one owner.
2. There can only be **one owner** at a time. Two owners of the same value cannot exist.
3. When the owner goes out of **scope**, the value is **automatically freed**."""

[[blocks]]
type = "text"
es = """## Que es el Scope?

El **scope** (alcance) es la zona del codigo donde una variable es valida y puede usarse. En Rust, el scope esta definido por las llaves `{}`. Una variable nace cuando se crea y muere cuando termina el bloque donde fue declarada.

Cuando una variable sale del scope, Rust automaticamente llama a una funcion interna llamada `drop` que libera los recursos que esa variable usaba. Tu no tienes que hacer nada: es completamente automatico."""
en = """## What is Scope?

The **scope** is the zone of code where a variable is valid and can be used. In Rust, scope is defined by curly braces `{}`. A variable is born when it's created and dies when the block where it was declared ends.

When a variable goes out of scope, Rust automatically calls an internal function called `drop` that frees the resources that variable was using. You don't have to do anything: it's completely automatic."""

[[blocks]]
type = "code"
language = "rust"
runnable = true
code = '''fn main() {
    // Ejemplo 1: scope basico
    {
        let mensaje = String::from("hola");  // mensaje nace aqui
        println!("Dentro del bloque: {}", mensaje);
    }  // <- mensaje sale del scope aqui. Rust llama drop() y libera la memoria.

    // println!("{}", mensaje);  // ERROR! mensaje ya no existe

    // Ejemplo 2: scopes anidados
    let exterior = String::from("vivo fuera");
    {
        let interior = String::from("vivo dentro");
        println!("{} y {}", exterior, interior);
        // interior es valido aqui, exterior tambien
    }  // interior se libera aqui

    println!("Solo queda: {}", exterior);
    // interior ya no existe, pero exterior sigue vivo
}  // exterior se libera aqui'''

[[blocks]]
type = "callout"
variant = "info"
es = """**Analogia:** Piensa en el scope como una habitacion. Cuando creas una variable, entra a la habitacion. Cuando el bloque `{}` termina, la habitacion se cierra y todo lo que estaba dentro se limpia automaticamente. Las variables de la habitacion exterior siguen vivas porque su habitacion no ha cerrado aun."""
en = """**Analogy:** Think of scope as a room. When you create a variable, it enters the room. When the `{}` block ends, the room closes and everything inside is automatically cleaned up. Variables from the outer room are still alive because their room hasn't closed yet."""

[[blocks]]
type = "text"
es = """## Ownership en accion: un ejemplo paso a paso

Veamos como Rust maneja la memoria automaticamente comparado con lo que tendrias que hacer manualmente en C:"""
en = """## Ownership in action: a step by step example

Let's see how Rust handles memory automatically compared to what you'd have to do manually in C:"""

[[blocks]]
type = "code"
language = "rust"
runnable = true
code = '''fn main() {
    // Paso 1: Rust reserva memoria para "Hola Rust"
    let saludo = String::from("Hola Rust");
    // En C, esto seria: char* saludo = malloc(...);

    println!("{}", saludo);

    // Paso 2: Creamos otro valor
    let despedida = String::from("Adios");
    // En C: char* despedida = malloc(...);

    println!("{}", despedida);

    // Paso 3: Llegamos al final del scope (el cierre de main)
    // Rust automaticamente hace:
    //   drop(despedida)  -> libera "Adios"
    //   drop(saludo)     -> libera "Hola Rust"
    // En C, OLVIDAR free() aqui causaria un memory leak.
    // En Rust, es IMPOSIBLE olvidarse. El compilador se encarga.
}'''

[[blocks]]
type = "text"
es = """## Por que es revolucionario?

Compara las tres estrategias:

| Estrategia | Ventaja | Desventaja |
|-----------|---------|------------|
| **Manual** (C/C++) | Maximo control y rendimiento | Facil cometer errores fatales |
| **Garbage Collector** (Python/Java/JS) | Comodo, sin errores de memoria | Pausas impredecibles, mas lento |
| **Ownership** (Rust) | Sin errores Y sin costo extra | Curva de aprendizaje al principio |

Rust te da lo mejor de ambos mundos: la seguridad del garbage collector con el rendimiento del manejo manual. El "precio" es que debes aprender las reglas de ownership, pero una vez que las entiendes, el compilador hace todo el trabajo pesado por ti."""
en = """## Why is this revolutionary?

Compare the three strategies:

| Strategy | Advantage | Disadvantage |
|----------|-----------|--------------|
| **Manual** (C/C++) | Maximum control and performance | Easy to make fatal errors |
| **Garbage Collector** (Python/Java/JS) | Convenient, no memory errors | Unpredictable pauses, slower |
| **Ownership** (Rust) | No errors AND no extra cost | Learning curve at first |

Rust gives you the best of both worlds: the safety of a garbage collector with the performance of manual management. The "price" is that you must learn the ownership rules, but once you understand them, the compiler does all the heavy lifting for you."""

