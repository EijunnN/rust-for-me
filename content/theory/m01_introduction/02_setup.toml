[title]
es = "Instalación y configuración"
en = "Setup and Installation"

[[blocks]]
type = "text"
es = """## Instalando Rust con rustup

La forma recomendada de instalar Rust es a través de **rustup**, el instalador oficial y gestor de versiones de Rust. rustup se encarga de instalar el compilador (`rustc`), el gestor de paquetes (`cargo`) y la documentación estándar.

### En Linux y macOS

Abre una terminal y ejecuta:

```bash
curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh
```

### En Windows

Descarga y ejecuta el instalador desde [rustup.rs](https://rustup.rs). También necesitarás instalar las herramientas de compilación de C++ de Visual Studio (Visual Studio Build Tools)."""
en = """## Installing Rust with rustup

The recommended way to install Rust is through **rustup**, the official Rust installer and version manager. rustup takes care of installing the compiler (`rustc`), the package manager (`cargo`), and the standard documentation.

### On Linux and macOS

Open a terminal and run:

```bash
curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh
```

### On Windows

Download and run the installer from [rustup.rs](https://rustup.rs). You will also need to install the C++ build tools from Visual Studio (Visual Studio Build Tools)."""

[[blocks]]
type = "callout"
variant = "warning"
es = "⚠️ En Windows, asegúrate de instalar Visual Studio Build Tools con el componente 'Desarrollo de escritorio con C++'. Sin esto, Rust no podrá compilar programas."
en = "⚠️ On Windows, make sure to install Visual Studio Build Tools with the 'Desktop development with C++' component. Without this, Rust won't be able to compile programs."

[[blocks]]
type = "text"
es = """## Verificando la instalación

Una vez completada la instalación, abre una nueva terminal y ejecuta estos comandos para verificar que todo funciona correctamente:

```bash
rustc --version
cargo --version
rustup --version
```

Deberías ver las versiones instaladas de cada herramienta. Si ves algo como `rustc 1.XX.X`, la instalación fue exitosa."""
en = """## Verifying the installation

Once the installation is complete, open a new terminal and run these commands to verify everything works correctly:

```bash
rustc --version
cargo --version
rustup --version
```

You should see the installed versions of each tool. If you see something like `rustc 1.XX.X`, the installation was successful."""

